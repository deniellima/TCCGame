{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/user.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <main>
        <div class="container">
            <img src="{% static '..\static\images\main.svg' %}" alt="Principal" class="img">
        </div>

        <div class="content">
            <form action="{% url 'login' %}" method="post" autocomplete="off" class="form">
                {% csrf_token %}

                <div class="title-content">
                    <a href="javascript:history.back()" class="btn-border small">
                        <i class="fa-solid fa-arrow-left"></i>Voltar
                    </a>
                    <h2>Entrar</h2>
                    <span class="error-message">*obrigatório</span>
                </div>
    
                <!-- Email -->
                <div class="inp-content right-1">
                    <label>Email<span>*</span></label>
                    <input type="email" placeholder="Informe seu email" id="email" name="email" required />
                </div>

                <!-- Password -->
                <div class="inp-content right-2">
                    <label>Senha<span>*</span></label>
                    <input type="password" placeholder="Informe uma senha" id="password" name="password" required />
                </div>

                <div class="forgot">
                    <a href="{% url 'forgotPassword' %}">Esqueceu a senha?</a>
                </div>
    
                <button type="submit" class="btn-green" id="submit">Entrar</button>

                <div class="footer">
                    <p>Ainda não possui uma conta? <a class="link" href="{% url 'register' %}">Criar conta</a></p>
                </div>
            </form>       
        </div>
    </main>

    {% include 'messages.html' %}

    <script src="{% static 'js/messages.js' %}"></script>
    <script src="{% static 'js/userLogin.js' %}"></script>
</body>
</html>
